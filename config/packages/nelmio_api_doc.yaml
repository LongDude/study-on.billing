nelmio_api_doc:
    documentation:
        info:
            title: Study-on.billing
            description: Billing for study-on!
            version: 1.0.0
        security:
            - Bearer: []

        paths:
            /api/v1/auth:
                post:
                    operationId: postCredentialsItem
                    tags:
                        - Token
                    summary: Get JWT authorization token for user credentials
                    requestBody:
                        description: Create JWT token
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/Credentials'
                    responses:
                        '200':
                            description: Recovered JWT token
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/Token'

        components:
            schemas:
                Token:
                    type: object
                    properties:
                        token:
                            type: string
                            readOnly: true
                Credentials:
                    type: object
                    properties:
                        username:
                            type: string
                            default: user@email.index
                        password:
                            type: string
                            default: user_plain_password
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT


    areas:
        path_patterns:
            - ^/api(?!/doc$)


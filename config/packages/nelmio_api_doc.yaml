nelmio_api_doc:
    use_validation_groups: false
    documentation:
        info:
            title: Study-on.billing
            description: Billing for study-on!
            version: 1.0.0
        security:
            - Bearer: []

        paths:
            /api/v1/auth:
                post:
                    operationId: postCredentialsItem
                    security: []
                    tags:
                        - Auth
                    summary: Get JWT authorization token for user credentials
                    requestBody:
                        description: Create JWT token
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/Credentials'
                    responses:
                        '200':
                            description: Recovered JWT token
                            content:
                                application/json:
                                    schema:
                                        $ref: '#/components/schemas/Token'

        components:
            schemas:
                Token:
                    type: object
                    description: "JWT Token"
                    properties:
                        token:
                            type: string
                            readOnly: true
                Credentials:
                    type: object
                    description: "User auth credentials"
                    required:
                        - username
                        - password
                    properties:
                        username:
                            type: string
                            default: user@email.index
                        password:
                            type: string
                            default: user_plain_password
            securitySchemes:
                Bearer:
                    type: http
                    description: "Enter JWT Bearer token"
                    scheme: bearer
                    bearerFormat: JWT

    media_types:
        - json

    areas:
        path_patterns:
            - ^/api(?!/doc$)

    models:

